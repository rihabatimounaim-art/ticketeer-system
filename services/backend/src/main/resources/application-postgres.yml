spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ticketeerdb}
    username: ${DATABASE_USER:ticketeer}
    password: ${DATABASE_PASSWORD:ticketeer}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
