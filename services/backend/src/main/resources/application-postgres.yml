spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketeer
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    secret: "change-this-secret-key-for-dev-only"
    expiration-seconds: 86400

ticketing:
  qr:
    secret: "change-this-ticket-qr-secret-for-dev"
