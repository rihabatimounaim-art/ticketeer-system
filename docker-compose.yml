services:

  postgres:
    image: postgres:16-alpine
    container_name: ticketeer-db
    environment:
      POSTGRES_DB: ticketeerdb
      POSTGRES_USER: ticketeer
      POSTGRES_PASSWORD: ticketeer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketeer -d ticketeerdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: ticketeer-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DATABASE_URL: jdbc:postgresql://postgres:5432/ticketeerdb
      DATABASE_USER: ticketeer
      DATABASE_PASSWORD: ticketeer
      JWT_SECRET: "ticketeer-super-secret-key-change-in-production-32ch"
      QR_SECRET: "ticketeer-qr-secret-key-change-in-production-32chars"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
