<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketeer - Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <div class="auth-layout">
    <div class="auth-brand">
      <div class="brand-badge">Ticketeer</div>
      <h1>Rail ticketing platform</h1>
      <p>
        Authenticate, search trips, manage tickets, download QR/PDF, and validate tickets
        from a cleaner dashboard experience.
      </p>
    </div>

    <div class="auth-card">
      <h2>Sign in</h2>
      <p class="muted">Use the seeded account for the demo.</p>

      <label>Email</label>
      <input id="email" type="email" value="admin@ticketeer.com" />

      <label>Password</label>
      <input id="password" type="password" value="admin123" />

      <button id="loginBtn" class="btn btn-primary btn-block">Login</button>

      <div id="loginStatus" class="status-line info"></div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
