<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketeer Web Client</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Ticketeer</h1>
    <p class="subtitle">Minimal frontend for authentication, ticket creation, and ticket control.</p>

    <section class="card">
      <h2>1. Login</h2>
      <input id="email" type="email" placeholder="Email" value="admin@ticketeer.com" />
      <input id="password" type="password" placeholder="Password" value="admin123" />
      <button id="loginBtn">Login</button>
      <pre id="loginResult"></pre>
    </section>

    <section class="card">
      <h2>2. Create Ticket</h2>
      <input id="holderId" type="text" placeholder="Holder UUID" value="11111111-1111-1111-1111-111111111111" />
      <input id="validFrom" type="text" placeholder="Valid from (ISO)" value="2026-04-02T18:00:00Z" />
      <input id="validUntil" type="text" placeholder="Valid until (ISO)" value="2026-04-02T22:00:00Z" />
      <button id="createTicketBtn">Create Ticket</button>
      <pre id="ticketResult"></pre>
    </section>

    <section class="card">
      <h2>3. Validate Ticket</h2>
      <input id="ticketId" type="text" placeholder="Ticket UUID" />
      <input id="agentId" type="text" placeholder="Agent UUID" value="11111111-1111-1111-1111-111111111111" />
      <button id="validateTicketBtn">Validate Ticket</button>
      <pre id="controlResult"></pre>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
