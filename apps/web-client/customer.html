<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketeer — Espace Client</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="dot">T</div>
        Ticketeer
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="sb-name">--</div>
      <div class="user-role">Voyageur</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showSection('search')">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Rechercher un trajet
      </button>
      <button class="nav-item" onclick="showSection('tickets')">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
        Mes billets
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="logout()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Deconnexion
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <h1 id="page-title">Rechercher un trajet</h1>
      <span class="badge badge-primary" id="sb-role">CLIENT</span>
    </div>

    <div class="page-content">

      <!-- SECTION: Search & Book -->
      <div id="section-search">
        <div id="alert-search"></div>

        <div class="search-form">
          <div class="form-group" style="margin:0">
            <label>Depart</label>
            <select id="from">
              <option value="">-- Choisir --</option>
              <option value="PARIS">Paris</option>
              <option value="LYON">Lyon</option>
              <option value="MARSEILLE">Marseille</option>
              <option value="LILLE">Lille</option>
              <option value="BORDEAUX">Bordeaux</option>
              <option value="NANTES">Nantes</option>
            </select>
          </div>
          <div class="form-group" style="margin:0">
            <label>Arrivee</label>
            <select id="to">
              <option value="">-- Choisir --</option>
              <option value="PARIS">Paris</option>
              <option value="LYON">Lyon</option>
              <option value="MARSEILLE">Marseille</option>
              <option value="LILLE">Lille</option>
              <option value="BORDEAUX">Bordeaux</option>
              <option value="NANTES">Nantes</option>
            </select>
          </div>
          <div class="form-group" style="margin:0">
            <label>Date</label>
            <input type="date" id="travel-date" />
          </div>
          <button class="btn btn-primary" onclick="searchTrips()" id="search-btn">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            Rechercher
          </button>
        </div>

        <div id="trips-result" class="hidden">
          <div class="section-title">Trajets disponibles</div>
          <div id="trips-grid" class="trips-grid"></div>
        </div>

        <div id="no-trips" class="hidden">
          <div class="empty-state">
            <div class="empty-icon">🚆</div>
            <p>Aucun trajet disponible pour cette recherche.</p>
          </div>
        </div>
      </div>

      <!-- SECTION: My Tickets -->
      <div id="section-tickets" class="hidden">
        <div id="alert-tickets"></div>
        <div class="flex-between" style="margin-bottom:20px">
          <div class="section-title" style="margin:0">Mes billets</div>
          <button class="btn btn-secondary btn-sm" onclick="loadMyTickets()">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Actualiser
          </button>
        </div>
        <div class="card" style="padding:0">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Trajet</th>
                  <th>Date de depart</th>
                  <th>Validite</th>
                  <th>Prix</th>
                  <th>Statut</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="tickets-body">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-400)">Chargement...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal: Confirm Purchase -->
<div id="modal-buy" class="modal-overlay hidden">
  <div class="modal">
    <button class="modal-close" onclick="closeBuyModal()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div class="modal-title">Confirmer l'achat</div>
    <div id="modal-trip-details" style="background:var(--gray-50);border-radius:8px;padding:16px;margin-bottom:20px;font-size:.9375rem"></div>
    <div id="alert-modal"></div>
    <div class="flex gap-3">
      <button class="btn btn-secondary w-full" onclick="closeBuyModal()">Annuler</button>
      <button class="btn btn-primary w-full" id="confirm-buy-btn" onclick="confirmPurchase()">Acheter</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Guard
  if (!Auth.isLoggedIn()) location.href = 'index.html';
  const user = Auth.getUser();
  if (user && user.role !== 'CUSTOMER' && user.role !== 'ADMIN') location.href = 'index.html';

  // Init
  document.getElementById('sb-name').textContent = user ? user.email : '';
  document.getElementById('travel-date').valueAsDate = new Date(Date.now() + 86400000);

  let selectedTrip = null;

  function showSection(name) {
    document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
    document.getElementById('section-' + name).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    event.currentTarget.classList.add('active');
    const titles = { search: 'Rechercher un trajet', tickets: 'Mes billets' };
    document.getElementById('page-title').textContent = titles[name] || '';
    if (name === 'tickets') loadMyTickets();
  }

  function logout() {
    Auth.clear();
    location.href = 'index.html';
  }

  // Search
  async function searchTrips() {
    const from = document.getElementById('from').value;
    const to   = document.getElementById('to').value;
    const date = document.getElementById('travel-date').value;

    if (!from || !to || !date) {
      showAlert('alert-search', 'error', 'Veuillez remplir tous les champs.');
      return;
    }
    if (from === to) {
      showAlert('alert-search', 'error', 'Le depart et l\'arrivee doivent etre differents.');
      return;
    }

    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Recherche...';

    try {
      const trips = await api.trips.search(from, to, date);
      renderTrips(trips);
    } catch (err) {
      showAlert('alert-search', 'error', err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Rechercher';
    }
  }

  function renderTrips(trips) {
    const grid = document.getElementById('trips-grid');
    document.getElementById('trips-result').classList.toggle('hidden', trips.length === 0);
    document.getElementById('no-trips').classList.toggle('hidden', trips.length > 0);

    if (trips.length === 0) return;

    grid.innerHTML = trips.map(t => `
      <div class="trip-card">
        <div class="trip-route">
          <span>${t.departureStationCode}</span>
          <span class="arrow">&#8594;</span>
          <span>${t.arrivalStationCode}</span>
        </div>
        <div class="trip-times">
          ${formatDatetime(t.departureTime)} &rarr; ${formatDatetime(t.arrivalTime)}
        </div>
        <div class="trip-footer">
          <span class="trip-price">${formatPrice(t.price)}</span>
          <button class="btn btn-primary btn-sm" onclick='openBuyModal(${JSON.stringify(t)})'>
            Acheter
          </button>
        </div>
      </div>
    `).join('');
  }

  function openBuyModal(trip) {
    selectedTrip = trip;
    document.getElementById('modal-trip-details').innerHTML = `
      <div style="font-weight:600;font-size:1.0625rem;margin-bottom:8px">${trip.departureStationCode} &rarr; ${trip.arrivalStationCode}</div>
      <div style="color:var(--gray-600);font-size:.875rem">Depart : ${formatDatetime(trip.departureTime)}</div>
      <div style="color:var(--gray-600);font-size:.875rem">Arrivee : ${formatDatetime(trip.arrivalTime)}</div>
      <div style="font-size:1.25rem;font-weight:700;color:var(--primary);margin-top:10px">${formatPrice(trip.price)}</div>
    `;
    document.getElementById('alert-modal').innerHTML = '';
    document.getElementById('modal-buy').classList.remove('hidden');
  }

  function closeBuyModal() {
    document.getElementById('modal-buy').classList.add('hidden');
    selectedTrip = null;
  }

  async function confirmPurchase() {
    if (!selectedTrip) return;
    const btn = document.getElementById('confirm-buy-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Achat...';

    try {
      const depTime = selectedTrip.departureTime;
      const arrTime = selectedTrip.arrivalTime;
      // validity = departure day (start) to arrival + 2h (end)
      const validFrom  = new Date().toISOString();
      const validUntil = new Date(new Date(arrTime).getTime() + 7200000).toISOString();

      await api.tickets.create({
        holderId: user.id,
        validFrom,
        validUntil,
        departureStationCode: selectedTrip.departureStationCode,
        arrivalStationCode:   selectedTrip.arrivalStationCode,
        departureTime: depTime,
        arrivalTime:   arrTime,
        price: selectedTrip.price,
      });

      closeBuyModal();
      showAlert('alert-search', 'success', 'Billet achete avec succes ! Consultez Mes billets.');
    } catch (err) {
      showAlert('alert-modal', 'error', err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Acheter';
    }
  }

  // My tickets
  async function loadMyTickets() {
    const tbody = document.getElementById('tickets-body');
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-400)">Chargement...</td></tr>';

    try {
      const tickets = await api.tickets.myTickets();
      if (tickets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray-400)">Aucun billet pour le moment.</td></tr>';
        return;
      }
      tbody.innerHTML = tickets.map(t => `
        <tr>
          <td><strong>${t.departureStationCode} &rarr; ${t.arrivalStationCode}</strong></td>
          <td>${formatDatetime(t.departureTime)}</td>
          <td style="font-size:.8125rem">
            Du ${formatDatetime(t.validFrom)}<br/>au ${formatDatetime(t.validUntil)}
          </td>
          <td>${formatPrice(t.price)}</td>
          <td>${statusBadge(t.status)}</td>
          <td>
            <div class="flex gap-2">
              <button class="btn btn-secondary btn-sm" title="Telecharger QR" onclick="downloadQr('${t.id}')">QR</button>
              <button class="btn btn-secondary btn-sm" title="Telecharger PDF" onclick="downloadPdf('${t.id}')">PDF</button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      showAlert('alert-tickets', 'error', err.message);
    }
  }

  async function downloadQr(ticketId) {
    try {
      const blob = await api.tickets.qr(ticketId);
      downloadBlob(blob, `billet-${ticketId}-qr.png`);
    } catch (err) {
      showAlert('alert-tickets', 'error', 'Erreur lors du telechargement du QR code.');
    }
  }

  async function downloadPdf(ticketId) {
    try {
      const blob = await api.tickets.pdf(ticketId);
      downloadBlob(blob, `billet-${ticketId}.pdf`);
    } catch (err) {
      showAlert('alert-tickets', 'error', 'Erreur lors du telechargement du PDF.');
    }
  }
</script>
</body>
</html>
