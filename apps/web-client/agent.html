<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketeer — Espace Controleur</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="dot">T</div>
        Ticketeer
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-name" id="sb-name">--</div>
      <div class="user-role">Controleur</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showSection('validate', this)">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Valider un billet
      </button>
      <button class="nav-item" onclick="showSection('history', this)">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Historique
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" onclick="logout()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Deconnexion
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <h1 id="page-title">Valider un billet</h1>
      <span class="badge badge-warning">AGENT</span>
    </div>

    <div class="page-content">

      <!-- SECTION: Validate -->
      <div id="section-validate" style="max-width:640px;margin:0 auto">
        <div id="alert-validate"></div>

        <!-- Manual entry -->
        <div class="card" style="margin-bottom:24px">
          <div class="card-title">Saisie manuelle de l'ID billet</div>
          <div style="display:flex;gap:12px;align-items:flex-end">
            <div class="form-group" style="flex:1;margin:0">
              <label for="ticket-id-input">ID du billet</label>
              <input type="text" id="ticket-id-input" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
            </div>
            <button class="btn btn-primary" onclick="validateManual()" id="validate-btn" style="white-space:nowrap">
              Valider
            </button>
          </div>
        </div>

        <!-- QR Scanner -->
        <div class="card" style="margin-bottom:24px">
          <div class="card-title">Scanner un QR code</div>
          <div style="text-align:center">
            <button class="btn btn-secondary" id="scan-btn" onclick="toggleScanner()">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
              Activer la camera
            </button>
            <div id="scanner-container" class="hidden" style="margin-top:16px">
              <div id="qr-reader" style="width:100%;max-width:400px;margin:0 auto;border-radius:10px;overflow:hidden"></div>
              <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="stopScanner()">Arreter</button>
            </div>
          </div>
        </div>

        <!-- Result -->
        <div id="validation-result" class="hidden"></div>
      </div>

      <!-- SECTION: History -->
      <div id="section-history" class="hidden">
        <div class="section-title">Historique des controles (session)</div>
        <div class="card" style="padding:0">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>ID Billet</th>
                  <th>Resultat</th>
                  <th>Heure</th>
                </tr>
              </thead>
              <tbody id="history-body">
                <tr><td colspan="4" style="text-align:center;padding:40px;color:var(--gray-400)">Aucun controle effectue dans cette session.</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="js/api.js"></script>
<script>
  if (!Auth.isLoggedIn()) location.href = 'index.html';
  const user = Auth.getUser();
  if (user && user.role !== 'AGENT' && user.role !== 'ADMIN') location.href = 'index.html';

  document.getElementById('sb-name').textContent = user ? user.email : '';

  const history = [];
  let scanner = null;
  let scannerActive = false;

  function showSection(name, btn) {
    document.querySelectorAll('[id^="section-"]').forEach(s => s.classList.add('hidden'));
    document.getElementById('section-' + name).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const titles = { validate: 'Valider un billet', history: 'Historique' };
    document.getElementById('page-title').textContent = titles[name] || '';
  }

  function logout() { Auth.clear(); location.href = 'index.html'; }

  async function validateTicket(ticketId) {
    const id = ticketId.trim();
    if (!id) { showAlert('alert-validate', 'error', 'Veuillez saisir un ID de billet.'); return; }

    try {
      const res = await api.control.validate(id);
      showValidationResult(id, res.result);
      addToHistory(id, res.result);
    } catch (err) {
      showAlert('alert-validate', 'error', err.message);
    }
  }

  function validateManual() {
    const id = document.getElementById('ticket-id-input').value;
    validateTicket(id);
  }

  function showValidationResult(ticketId, result) {
    const cfg = {
      VALID:             { cls: 'valid',   icon: '✅', label: 'BILLET VALIDE',           sub: 'Ce billet est authentique et valide.' },
      EXPIRED:           { cls: 'expired', icon: '❌', label: 'BILLET EXPIRE',           sub: 'Ce billet n\'est plus valable.' },
      ALREADY_CONTROLLED:{ cls: 'already', icon: '⚠️', label: 'DEJA CONTROLE',           sub: 'Ce billet a deja ete valide precedemment.' },
    };
    const c = cfg[result] || { cls: 'expired', icon: '❓', label: result, sub: '' };

    document.getElementById('validation-result').innerHTML = `
      <div class="validation-box ${c.cls}">
        <div class="result-icon">${c.icon}</div>
        <div class="result-label">${c.label}</div>
        <div class="result-sub">${c.sub}</div>
        <div style="margin-top:16px;font-size:.8125rem;color:var(--gray-600)">ID : ${ticketId}</div>
        <button class="btn btn-secondary btn-sm" style="margin-top:16px" onclick="resetValidation()">Nouveau controle</button>
      </div>
    `;
    document.getElementById('validation-result').classList.remove('hidden');
  }

  function resetValidation() {
    document.getElementById('validation-result').classList.add('hidden');
    document.getElementById('ticket-id-input').value = '';
    document.getElementById('alert-validate').innerHTML = '';
  }

  function addToHistory(ticketId, result) {
    history.unshift({ ticketId, result, time: new Date().toLocaleTimeString('fr-FR') });
    const tbody = document.getElementById('history-body');
    tbody.innerHTML = history.map((h, i) => {
      const badge = h.result === 'VALID' ? 'badge-success' : h.result === 'EXPIRED' ? 'badge-danger' : 'badge-warning';
      return `<tr>
        <td>${history.length - i}</td>
        <td style="font-family:monospace;font-size:.8rem">${h.ticketId.substring(0, 18)}...</td>
        <td><span class="badge ${badge}">${h.result}</span></td>
        <td>${h.time}</td>
      </tr>`;
    }).join('');
  }

  // QR Scanner
  async function toggleScanner() {
    if (scannerActive) { stopScanner(); return; }
    document.getElementById('scanner-container').classList.remove('hidden');
    document.getElementById('scan-btn').textContent = 'Arreter la camera';
    scannerActive = true;

    scanner = new Html5Qrcode('qr-reader');
    try {
      await scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decoded) => {
          // Extract ticketId from QR payload (format: ticketId=xxx;holderId=...)
          let ticketId = decoded;
          const match = decoded.match(/ticketId=([^;]+)/);
          if (match) ticketId = match[1];
          stopScanner();
          document.getElementById('ticket-id-input').value = ticketId;
          validateTicket(ticketId);
        },
        () => {}
      );
    } catch (err) {
      showAlert('alert-validate', 'error', 'Impossible d\'acceder a la camera : ' + err.message);
      scannerActive = false;
      document.getElementById('scanner-container').classList.add('hidden');
    }
  }

  function stopScanner() {
    if (scanner && scannerActive) {
      scanner.stop().catch(() => {});
      scanner = null;
    }
    scannerActive = false;
    document.getElementById('scanner-container').classList.add('hidden');
    document.getElementById('scan-btn').innerHTML = `
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
      Activer la camera`;
  }

  // Enter key support
  document.getElementById('ticket-id-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') validateManual();
  });
</script>
</body>
</html>
